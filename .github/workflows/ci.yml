name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Guard dashboard assets
        run: pnpm build

      - name: Check Guard dashboard assets
        run: git diff --exit-code internal/guard/web/assets

      - name: Check formatting
        run: test -z "$(gofmt -l $(find cmd internal -name '*.go' -type f))"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Guard smoke test
        run: go run ./cmd/kontext guard smoke-test

      - name: Guard local E2E
        run: make guard-e2e

      - name: Check vulnerabilities
        run: |
          go build -o ./bin/kontext ./cmd/kontext
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck -mode=binary ./bin/kontext

  proto:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Buf
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.58.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1

      - name: Generate protobuf code
        run: buf generate

      - name: Check generated code is up to date
        run: git diff --exit-code gen/ || (echo "Generated code is out of date. Run 'buf generate' and commit." && exit 1)
