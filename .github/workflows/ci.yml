name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v4.1.0
        with:
          version: 10.0.0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Guard dashboard assets
        run: pnpm build

      - name: Check Guard dashboard assets
        run: git diff --exit-code internal/guard/web/assets

      - name: Check formatting
        run: test -z "$(gofmt -l $(find cmd internal -name '*.go' -type f))"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Guard smoke test
        run: go run ./cmd/kontext guard smoke-test

      - name: Guard local E2E
        run: make guard-e2e

      - name: Check vulnerabilities
        run: |
          go build -o ./bin/kontext ./cmd/kontext
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck -mode=binary ./bin/kontext

  proto:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Buf
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.58.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1

      - name: Generate protobuf code
        run: buf generate

      - name: Check generated code is up to date
        run: git diff --exit-code gen/ || (echo "Generated code is out of date. Run 'buf generate' and commit." && exit 1)
