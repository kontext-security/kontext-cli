name: Feature request
description: Propose an improvement to Kontext CLI
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please focus on the user problem first, then the shape of the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, missing, or confusing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Share rejected approaches or workarounds.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples
    validations:
      required: false
