name: Bug report
description: Report a reproducible bug in Kontext CLI
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please include enough detail for us to reproduce the issue quickly.
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `kontext --version`
      placeholder: v0.1.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      description: For example macOS 15 arm64 or Ubuntu 24.04 amd64
      placeholder: macOS 15 arm64
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact command you ran
      placeholder: kontext start --agent claude
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact secrets before posting
      render: shell
    validations:
      required: false
