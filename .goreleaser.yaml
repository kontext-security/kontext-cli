# Keep in sync with .goreleaser.staging.yaml — the staging channel must build
# exactly what prod ships.
version: 2

project_name: kontext

before:
  hooks:
    - pnpm install --frozen-lockfile
    - ./scripts/build-guard-dashboard-assets.sh

builds:
  - main: ./cmd/kontext
    binary: kontext
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
