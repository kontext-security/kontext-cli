version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/kontext-dev/kontext-cli/gen
inputs:
  - git_repo: https://github.com/kontext-dev/proto.git
    branch: main
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt: paths=source_relative
